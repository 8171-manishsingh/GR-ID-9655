
<!DOCTYPE html>
<html>
<head>
<title>Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-box">

<div class="header">
<h2>Awesome Quiz Application</h2>
<div class="timer">Time Left: <span id="time">10</span></div>
</div>

<div id="question">Question here</div>

<div id="answers" class="options"></div>

<button id="nextBtn">Next Question</button>

<div id="scoreBox"></div>

<button id="restartBtn" style="display:none;">Restart Quiz</button>

</div>

<script src="script.js"></script>

</body>
</html>
